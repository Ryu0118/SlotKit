name: Docsync Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docsync:
    name: Docsync Check
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Bootstrap dev tools (nest)
        run: ./scripts/nest.sh bootstrap nestfile.yaml

      - name: Check doc sync
        run: .nest/bin/docsync check
