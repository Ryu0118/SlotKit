name: Test

on:
  push:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swift-ast-lint.yml'
      - 'nestfile.yaml'
      - 'scripts/nest.sh'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swift-ast-lint.yml'
      - 'nestfile.yaml'
      - 'scripts/nest.sh'
      - '.github/workflows/test.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (SwiftLint + my-swift-linter)
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Bootstrap dev tools (nest)
        run: ./scripts/nest.sh bootstrap nestfile.yaml

      - name: SwiftLint
        run: .nest/bin/swiftlint lint --config .swiftlint.yml --strict

      - name: my-swift-linter
        run: .nest/bin/my-swift-linter --config .swift-ast-lint.yml

  test:
    name: Unit Tests (macOS)
    needs: lint
    runs-on: macos-26
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer

      - name: Show Swift version
        run: xcrun swift --version

      - name: Run tests
        run: xcrun swift test
